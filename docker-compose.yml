# docker-compose.yml — LOCAL DEVELOPMENT
# Copy .env.example to .env and fill in your values before running.
# Docker Compose automatically loads variables from .env in this directory.

services:
  mongo:
    image: mongo:6.0
    container_name: chatbot-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7
    container_name: chatbot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  eureka-server:
    build:
      context: ./eureka-server
    container_name: chatbot-eureka
    ports:
      - "8761:8761"
    environment:
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512m

  gateway:
    build:
      context: ./gateway
    container_name: chatbot-gateway
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512m

  auth-service:
    build:
      context: ./auth-service
    container_name: chatbot-auth
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGO_URI_AUTH}
      - JWT_SECRET=${JWT_SECRET}
      - OAUTH2_CLIENT_ID=${OAUTH2_CLIENT_ID}
      - OAUTH2_CLIENT_SECRET=${OAUTH2_CLIENT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512m

  book-appointment:
    build:
      context: ./book_appointment
    container_name: chatbot-book-appointment
    ports:
      - "9091:9091"
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGO_URI_BOOK}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512m

  chat:
    build:
      context: ./chat
    container_name: chatbot-chat
    ports:
      - "9090:9090"
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGO_URI_CHAT}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_URL}
      - JWT_SECRET=${JWT_SECRET}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512m

  i18n-service:
    build:
      context: ./i18n-service
    container_name: chatbot-i18n
    ports:
      - "9092:9092"
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGO_URI_I18N}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9092/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  mongo-data:
