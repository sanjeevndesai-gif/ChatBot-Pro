# ================= APP =================
spring.application.name=book_appointment

server.port=9091

# ================= MONGODB =================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/book_appointment}

# ================= ATS CONFIG (USED BY REPOSITORY) =================
ats.mongodbUri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017}
ats.mongoDatabase=book_appointment
ats.collection=appointments
ats.schedulerCollection=schedulers

# ================= CACHE (DISABLED REDIS) =================
spring.cache.type=none

# ================= SWAGGER =================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ================= EUREKA / SERVICE DISCOVERY =================
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# OAuth2 resource server
oauth2.jwt.secret=${JWT_SECRET:local-dev-only-change-me-in-production}

# ================= ACTUATOR HEALTH PROBES =================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ================= LOGGING =================
logging.level.root=INFO
logging.level.org.springframework.web=WARN
logging.level.com.arnan=INFO
