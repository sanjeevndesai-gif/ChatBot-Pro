# ================= APP =================
spring.application.name=book_appointment

server.port=9091

# ================= MONGODB (Spring Boot default) — defaults to local; overridden by profile files =================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/book_appointment}

# ================= ATS CONFIG (USED BY REPOSITORY) =================
ats.mongodbUri=${ATS_MONGODB_URI:mongodb://localhost:27017}
ats.mongoDatabase=book_appointment
ats.collection=appointments
ats.schedulerCollection=schedulers
# OPTIONAL (only if using host+port mode)
# ats.mongodbUri=localhost
# ats.mongodbPort=27017

# ================= CACHE (DISABLED REDIS) =================
spring.cache.type=none

# ================= SWAGGER =================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ================= EUREKA / SERVICE DISCOVERY =================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# OAuth2 resource server
oauth2.jwt.secret=${JWT_SECRET:ARNAN_AUTH_SERVICE_ULTRA_SECURE_SECRET_2026!!}
