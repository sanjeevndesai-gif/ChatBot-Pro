<!-- login.html -->
<div class="container login-container min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="row col-md-9 container-box shadow-lg rounded overflow-hidden">

        <!-- Left Column -->
        <div class="col-md-6 cb-bg-gradient d-flex flex-column justify-content-center p-4">
            <div class="text-center">
                <img src="assets\images\chatconceptreg.png" alt="Chat Concept" class="img-fluid" />
                <p>Lorem ipsum dolor sit</p>
            </div>
        </div>

        <!-- Right Column -->
        <div class="col-md-5 d-flex align-items-center mx-auto p-4">

            <div class=" w-100 justify-content-center">
                <h3 class="fw-bold mb-1">SignIn to your account</h3>
                <p class="text-muted mb-4 small">Start building amazing WhatsApp chatbots today</p>

                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="row g-2" novalidate>

                    <!-- Email -->
                    <div class="mb-3">
                        <input type="email" formControlName="email" class="form-control" placeholder="Email" />
                        <div *ngIf="f['email'].touched && f['email'].invalid" class="text-danger mt-1">
                            <div *ngIf="f['email'].errors?.['required']">Email is required.</div>
                            <div *ngIf="f['email'].errors?.['email']">Invalid email format.</div>
                        </div>
                    </div>



                    <!-- Password -->
                    <div class="mb-3 position-relative">
                        <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                            class="form-control" placeholder="Password" />
                        <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" (click)="togglePassword()"
                            style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;"></i>
                        <div *ngIf="f['password'].touched && f['password'].invalid" class="text-danger mt-1">
                            Password is required.
                        </div>
                    </div>


                    <!-- Submit Button -->
                    <button type="submit" class="cb-btn cb-btn-primary full-width" [disabled]="loginForm.invalid">
                        Sign In
                    </button>

                </form>
                <hr class="my-3" />

                <div class="mt-3 text-center">
                    <p class="mb-1">Don't have an account?</p>
                    <a routerLink="/register" class="cb-btn cb-btn-outline-primary">Register here</a>
                </div>
                <div class="mt-3 text-center">
                    <a routerLink="/" class="cb-text-primary mb-2 mb-md-0" style="text-decoration: none;">← Back to
                        Home</a>
                </div>

            </div>
        </div>

    </div>
</div>
