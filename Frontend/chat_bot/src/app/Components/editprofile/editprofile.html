<div class="profile-wrapper">
  <div class="profile-card">

    <!-- Profile Image -->
    <div class="photo-section">
      <img src="https://i.pravatar.cc/150" width="32"  data-bs-toggle="dropdown" />
      <div class="actions">
        <button class="btn primary">Upload new photo</button>
        <button class="btn light">Reset</button>
        <div class="note">
        <!-- <p >Allowed JPG, GIF or PNG. Max size of 800K</p> -->
        </div>
      </div>
    </div>

    <!-- Form -->
    <form>
      <div class="form-grid">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" value="John" />
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" value="Doe" />
        </div>

        <div class="form-group">
          <label>E-mail</label>
          <input type="email" value="john.doe@example.com" />
        </div>

        <div class="form-group">
          <label>Organization</label>
          <input type="text" value="ThemeSelection" />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" value="US (+1) 202 555 0111" />
        </div>

        <div class="form-group">
          <label>Address</label>
          <input type="text" placeholder="Address" />
        </div>

        <div class="form-group">
          <label>State</label>
          <input type="text" placeholder="California" />
        </div>

        <div class="form-group">
          <label>Zip Code</label>
          <input type="text" placeholder="231465" />
        </div>

        <div class="form-group">
          <label>Country</label>
          <select>
            <option>Select</option>
            <option>India</option>
            <option>USA</option>
          </select>
        </div>

        <div class="form-group">
          <label>Language</label>
          <select>
            <option>Select Language</option>
            <option>English</option>
            <option>Hindi</option>
          </select>
        </div>

        <div class="form-group">
          <label>Timezone</label>
          <select>
            <option>Select Timezone</option>
          </select>
        </div>

        <div class="form-group">
          <label>Currency</label>
          <select>
            <option>Select Currency</option>
          </select>
        </div>
      </div>
    </form>
    <form>
      <div class="form-grid">
        <p style="padding-top: 30px;">Change Password</p>
       <h6></h6>
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" name="password" required placeholder="*********" />
      
        </div>
        <h4></h4>

        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="password" required placeholder="*********" />
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" name="password" required placeholder="*********" />
        </div>

      </div>

      <p>Password Requirements:</p>
      <ul>
        <li> <p>Minimum 8 characters long - the more, the better</p> </li>
        <li> <p>At least one lowercase character</p> </li>
        <li> <p>At least one number, symbol, or whitespace character</p> </li>
      </ul>

      <!-- Buttons -->
      <div class="actions">
        <button type="submit" class="btn primary">Save changes</button>
        <button type="button" class="btn light">Cancel</button>
      </div>
    </form>

  </div>
</div>
