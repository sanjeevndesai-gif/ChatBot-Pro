<div class="settings-wrapper">

  <!-- Report Setting Card -->
  <div class="card">
    <div class="card-content">

      <div class="settings-section">
        <h3 class="section-title">Report Setting</h3>

        <div class="card-item">
          <div>
            <strong>On demand</strong>
            <span>Say Hi and get report</span>
          </div>
          <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>

        <div class="card-item">
          <div>
            <strong>Scheduled Report</strong>
            <span>Every day will report</span>
          </div>
          <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>

      </div>

    </div>
  </div>

  <!-- Message Setting Card -->
  <div class="card">
    <div class="card-content">

      <div class="settings-section">
        <h3 class="section-title">Message Setting</h3>

        <div class="card-item">
          <div>
            <strong>Feedback message</strong>
            <span>Not Connected</span>
          </div>
          <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>

        <div class="card-item">
          <div>
            <strong>Reminder messages</strong>
            <span>Calendar & contacts</span>
          </div>
          <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>

      </div>

    </div>
  </div>

</div>
