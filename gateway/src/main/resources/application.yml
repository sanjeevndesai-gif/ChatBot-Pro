spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: book-appointment
          uri: lb://book_appointment
          predicates:
            - Path=/book/**
          filters:
            - StripPrefix=1
        - id: chat-service
          uri: lb://chat
          predicates:
            - Path=/chat/**
          filters:
            - StripPrefix=1
        - id: i18n-service
          uri: lb://i18n-service
          predicates:
            - Path=/i18n/**
          filters:
            - StripPrefix=1

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: INFO
    org.springframework.web: WARN
    org.springframework.cloud.gateway: WARN

oauth2:
  jwt:
    secret: ${JWT_SECRET:local-dev-only-change-me-in-production}

oauth2:
  jwt:
    secret: ${JWT_SECRET:ARNAN_AUTH_SERVICE_ULTRA_SECURE_SECRET_2026!!}
