# ===============================
# Application
# ===============================
spring.application.name=i18n-service
server.port=9092

# ===============================
# Logging
# ===============================
logging.level.root=INFO
logging.level.org.springframework.web=WARN
logging.level.com.arnan=INFO

# ===============================
# MongoDB
# ===============================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/i18n-service}
spring.data.mongodb.database=i18n-service
spring.data.mongodb.auto-index-creation=true

# ===============================
# OAuth2 / JWT
# ===============================
oauth2.jwt.secret=${JWT_SECRET:local-dev-only-change-me-in-production}

# ===============================
# Eureka / Service Discovery
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

