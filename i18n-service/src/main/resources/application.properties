# ===============================
# Application
# ===============================
spring.application.name=i18n-service
server.port=9092

# ===============================
# Logging
# ===============================
logging.level.org.springframework.web=DEBUG

# ===============================
# MongoDB — defaults to local; overridden by profile files (dev/prod)
# ===============================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/i18n-service}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:i18n-service}
spring.data.mongodb.auto-index-creation=true

# ===============================
# OAuth2 / JWT
# ===============================
oauth2.jwt.secret=${JWT_SECRET:ARNAN_AUTH_SERVICE_ULTRA_SECURE_SECRET_2026!!}

# ===============================
# Eureka / Service Discovery
# ===============================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
