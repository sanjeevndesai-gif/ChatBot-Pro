AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  ECS + ECR starter stack for ChatBot-Pro.

  This template creates:
    • ECR repositories for each microservice
    • An ECS cluster + IAM roles
    • A Fargate task + service for the gateway (as an example)

  NOTE: This is a starting point. Update VPC/Subnets/SecurityGroups to match your
  environment and extend task definitions for other services.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the ECS cluster and ALB will be deployed.

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for the ALB.

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for ECS tasks.

  EcrRepositoryPrefix:
    Type: String
    Default: chatbot-pro
    Description: Prefix for created ECR repositories.

  IngressCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to access the ALB.

Resources:
  ECRRepoGateway:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-gateway"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 20 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 20
              },
              "action": { "type": "expire" }
            }]
          }

  ECRRepoAuthService:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-auth-service"

  ECRRepoBookAppointment:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-book-appointment"

  ECRRepoChat:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-chat"

  ECRRepoEureka:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-eureka"

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${EcrRepositoryPrefix}-cluster"

  GatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EcrRepositoryPrefix}-gateway"
      RetentionInDays: 14

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB security group for gateway
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref IngressCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  GatewayServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS service security group for gateway
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"

  GatewayTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EcrRepositoryPrefix}-gateway-task"
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: gateway
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryPrefix}-gateway:latest"
          PortMappings:
            - ContainerPort: 8080
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              Value: !Sub "http://eureka-service:8761/eureka/"
            - Name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              Value: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/${EcrRepositoryPrefix}-gateway"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: gateway

  GatewayService:
    Type: AWS::ECS::Service
    DependsOn: GatewayLoadBalancerListener
    Properties:
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      DesiredCount: 1
      TaskDefinition: !Ref GatewayTaskDefinition
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref GatewayServiceSecurityGroup
      LoadBalancers:
        - ContainerName: gateway
          ContainerPort: 8080
          TargetGroupArn: !Ref GatewayTargetGroup

  GatewayLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EcrRepositoryPrefix}-alb"
      Scheme: internet-facing
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup

  GatewayTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EcrRepositoryPrefix}-gateway-tg"
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckPath: /actuator/health/readiness
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-399

  GatewayLoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref GatewayTargetGroup
      LoadBalancerArn: !Ref GatewayLoadBalancer
      Port: 80
      Protocol: HTTP

Outputs:
  ClusterArn:
    Value: !Ref ECSCluster
  GatewayServiceArn:
    Value: !Ref GatewayService
  GatewayLoadBalancerDns:
    Value: !GetAtt GatewayLoadBalancer.DNSName
