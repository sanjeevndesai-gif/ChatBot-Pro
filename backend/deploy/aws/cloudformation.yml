AWSTemplateFormatVersion: '2010-09-09'
Description: ECS + ECR stack for ChatBot-Pro with ALB, ECS Fargate services, and Secrets Manager.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0ac1ba06da333b881
    Description: VPC where the ECS cluster and ALB will be deployed.

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the target VPC, used by security group rules.

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-08350288927b08e2d,subnet-0e3b3e97ea31ab6ac
    Description: Public subnets for the ALB (2 AZs minimum).

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-0c1a31b34c658a71c,subnet-0c28af64e21026239
    Description: Private subnets for ECS tasks (2 AZs minimum).

  EcrRepositoryPrefix:
    Type: String
    Default: chatbot-app
    Description: Prefix for ECR repositories and all named resources.

  CreateEcrRepositories:
    Type: String
    Default: true
    AllowedValues:
      - true
      - false
    Description: Set to false when repositories are created and populated outside this stack.

  DeploymentMode:
    Type: String
    Default: lean
    AllowedValues:
      - lean
      - production
    Description: lean minimizes monthly cost; production enables NAT and HTTPS redirect/listener.

  IngressCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to reach the public ALB on ports 80 and 443.

  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN for the public HTTPS listener.

  EurekaNamespaceName:
    Type: String
    Default: chatbot.local
    Description: Private DNS namespace used by Cloud Map for service discovery.

  RedisHost:
    Type: String
    Description: Redis endpoint used by the chat service.

  RedisPort:
    Type: Number
    Default: 6379
    Description: Redis port used by the chat service.

  PrivateRouteTableIdA:
    Type: String
    Default: ''
    Description: Optional private route table ID (AZ-A) to route 0.0.0.0/0 via NAT.

  PrivateRouteTableIdB:
    Type: String
    Default: ''
    Description: Optional private route table ID (AZ-B) to route 0.0.0.0/0 via NAT.

  EurekaDesiredCount:
    Type: Number
    Default: 1
    Description: Number of Eureka tasks. Keep at 1 (single registry).

  GatewayDesiredCount:
    Type: Number
    Default: 1
    Description: Desired task count for gateway service.

  NonCoreServiceDesiredCount:
    Type: Number
    Default: 0
    Description: Desired task count for auth, book, chat, and i18n services (0 is cheapest).

  ServiceDesiredCount:
    Type: Number
    Default: 1
    Description: Legacy parameter (not used in lean mode template).

Conditions:
  IsLean: !Equals [!Ref DeploymentMode, 'lean']
  IsProduction: !Equals [!Ref DeploymentMode, 'production']
  ShouldCreateEcrRepositories: !Equals [!Ref CreateEcrRepositories, 'true']
  HasPrivateRouteTableA: !Not [!Equals [!Ref PrivateRouteTableIdA, '']]
  HasPrivateRouteTableB: !Not [!Equals [!Ref PrivateRouteTableIdB, '']]
  HasPrivateRouteTableAInProduction: !And [!Condition IsProduction, !Condition HasPrivateRouteTableA]
  HasPrivateRouteTableBInProduction: !And [!Condition IsProduction, !Condition HasPrivateRouteTableB]

Resources:

  # 
  # ECR REPOSITORIES (all 6 services, lifecycle: keep last 20)
  # 
  ECRRepoGateway:
    Type: AWS::ECR::Repository
    Condition: ShouldCreateEcrRepositories
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-gateway"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 20","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":20},"action":{"type":"expire"}}]}

  ECRRepoAuthService:
    Type: AWS::ECR::Repository
    Condition: ShouldCreateEcrRepositories
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-auth-service"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 20","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":20},"action":{"type":"expire"}}]}

  ECRRepoBookAppointment:
    Type: AWS::ECR::Repository
    Condition: ShouldCreateEcrRepositories
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-book-appointment"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 20","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":20},"action":{"type":"expire"}}]}

  ECRRepoChat:
    Type: AWS::ECR::Repository
    Condition: ShouldCreateEcrRepositories
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-chat"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 20","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":20},"action":{"type":"expire"}}]}

  ECRRepoEureka:
    Type: AWS::ECR::Repository
    Condition: ShouldCreateEcrRepositories
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-eureka"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 20","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":20},"action":{"type":"expire"}}]}

  ECRRepoI18n:
    Type: AWS::ECR::Repository
    Condition: ShouldCreateEcrRepositories
    Properties:
      RepositoryName: !Sub "${EcrRepositoryPrefix}-i18n-service"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 20","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":20},"action":{"type":"expire"}}]}

  # 
  # SECRETS MANAGER
  # Store placeholder secrets  update values after deploy with:
  #   aws secretsmanager put-secret-value --secret-id <name> --secret-string '{"KEY":"value"}'
  # 
  SecretJwt:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EcrRepositoryPrefix}/jwt-secret"
      Description: JWT signing secret shared by all ChatBot-Pro services
      SecretString: '{"JWT_SECRET":"REPLACE_WITH_STRONG_SECRET"}'

  SecretOAuth2:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EcrRepositoryPrefix}/oauth2"
      Description: OAuth2 client credentials
      SecretString: '{"OAUTH2_CLIENT_ID":"chatbot-client","OAUTH2_CLIENT_SECRET":"REPLACE_WITH_STRONG_SECRET"}'

  SecretMongoDB:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EcrRepositoryPrefix}/mongodb"
      Description: MongoDB Atlas connection URIs per database
      SecretString: !Sub |
        {
          "MONGO_URI_AUTH":    "mongodb+srv://user:pass@cluster.mongodb.net/auth-service",
          "MONGO_URI_BOOK":    "mongodb+srv://user:pass@cluster.mongodb.net/book_appointment",
          "MONGO_URI_CHAT":    "mongodb+srv://user:pass@cluster.mongodb.net/chatdb",
          "MONGO_URI_I18N":    "mongodb+srv://user:pass@cluster.mongodb.net/i18n-service"
        }

  SecretChat:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EcrRepositoryPrefix}/chat"
      Description: WhatsApp Cloud API and OpenAI credentials
      SecretString: '{"WHATSAPP_TOKEN":"REPLACE_WITH_TOKEN","WHATSAPP_PHONE_ID":"REPLACE_WITH_PHONE_ID","OPENAI_API_KEY":"REPLACE_IF_USED"}'

  # 
  # ECS CLUSTER
  # 
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${EcrRepositoryPrefix}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # 
  # IAM ROLES
  # 
  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: SecretsManagerReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref SecretJwt
                  - !Ref SecretOAuth2
                  - !Ref SecretMongoDB
                  - !Ref SecretChat

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # 
  # CLOUDWATCH LOG GROUPS (all 6 services, 14-day retention)
  # 
  LogGroupEureka:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EcrRepositoryPrefix}-eureka"
      RetentionInDays: 14

  LogGroupAuth:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EcrRepositoryPrefix}-auth-service"
      RetentionInDays: 14

  LogGroupBook:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EcrRepositoryPrefix}-book-appointment"
      RetentionInDays: 14

  LogGroupChat:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EcrRepositoryPrefix}-chat"
      RetentionInDays: 14

  LogGroupI18n:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EcrRepositoryPrefix}-i18n-service"
      RetentionInDays: 14

  GatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EcrRepositoryPrefix}-gateway"
      RetentionInDays: 14

  # 
  # SECURITY GROUPS
  # 
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and HTTPS from internet to ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref IngressCidr
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref IngressCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # Shared SG for all internal ECS services (eureka, auth, book, chat, i18n)
  InternalServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Internal ECS service communication (all ports within VPC)
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 9999
          CidrIp: !Ref VpcCidr
        - IpProtocol: tcp
          FromPort: 8761
          ToPort: 8761
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 27017
          ToPort: 27017
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 0.0.0.0/0
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0

  GatewayServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Gateway ECS service  inbound from ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 8761
          ToPort: 8761
          CidrIp: !Ref VpcCidr
        - IpProtocol: tcp
          FromPort: 8082
          ToPort: 9092
          CidrIp: !Ref VpcCidr
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  # 
  # ALB + TARGET GROUP + LISTENER
  # 
  GatewayLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EcrRepositoryPrefix}-alb"
      Scheme: internet-facing
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup

  NatElasticIp:
    Type: AWS::EC2::EIP
    Condition: IsProduction
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: IsProduction
    Properties:
      AllocationId: !GetAtt NatElasticIp.AllocationId
      SubnetId: !Select [0, !Ref PublicSubnetIds]

  PrivateDefaultRouteA:
    Type: AWS::EC2::Route
    Condition: HasPrivateRouteTableAInProduction
    Properties:
      RouteTableId: !Ref PrivateRouteTableIdA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateDefaultRouteB:
    Type: AWS::EC2::Route
    Condition: HasPrivateRouteTableBInProduction
    Properties:
      RouteTableId: !Ref PrivateRouteTableIdB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  GatewayTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EcrRepositoryPrefix}-gateway-tg"
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckPath: /actuator/health/readiness
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-399

  GatewayLoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: IsLean
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref GatewayTargetGroup
      LoadBalancerArn: !Ref GatewayLoadBalancer
      Port: 80
      Protocol: HTTP

  GatewayLoadBalancerHttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: IsProduction
    Properties:
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            Host: '#{host}'
            Path: '/#{path}'
            Query: '#{query}'
            StatusCode: HTTP_301
      LoadBalancerArn: !Ref GatewayLoadBalancer
      Port: 80
      Protocol: HTTP

  GatewayLoadBalancerHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: IsProduction
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref GatewayTargetGroup
      LoadBalancerArn: !Ref GatewayLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref AcmCertificateArn

  ServiceDiscoveryNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Ref EurekaNamespaceName
      Vpc: !Ref VpcId

  EurekaDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: eureka
      NamespaceId: !Ref ServiceDiscoveryNamespace
      DnsConfig:
        RoutingPolicy: MULTIVALUE
        DnsRecords:
          - Type: A
            TTL: 30

  # 
  # TASK DEFINITION: eureka-server  (starts first)
  # 
  EurekaTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EcrRepositoryPrefix}-eureka-task"
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: eureka-server
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryPrefix}-eureka:latest"
          PortMappings:
            - ContainerPort: 8761
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "${SecretJwt}:JWT_SECRET::"
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: EUREKA_SERVER_ENABLE_SELF_PRESERVATION
              Value: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/${EcrRepositoryPrefix}-eureka"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: eureka
          HealthCheck:
            Command: ["CMD-SHELL", "curl -sf http://localhost:8761/actuator/health | grep -q UP || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

  EurekaService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${EcrRepositoryPrefix}-eureka"
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      DesiredCount: !Ref EurekaDesiredCount
      TaskDefinition: !Ref EurekaTaskDefinition
      HealthCheckGracePeriodSeconds: 90
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [IsLean, 'ENABLED', 'DISABLED']
          Subnets: !If [IsLean, !Ref PublicSubnetIds, !Ref PrivateSubnetIds]
          SecurityGroups:
            - !Ref InternalServiceSecurityGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt EurekaDiscoveryService.Arn

  # 
  # TASK DEFINITION: auth-service
  # 
  AuthServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EcrRepositoryPrefix}-auth-service-task"
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: auth-service
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryPrefix}-auth-service:latest"
          PortMappings:
            - ContainerPort: 8082
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "${SecretJwt}:JWT_SECRET::"
            - Name: OAUTH2_CLIENT_ID
              ValueFrom: !Sub "${SecretOAuth2}:OAUTH2_CLIENT_ID::"
            - Name: OAUTH2_CLIENT_SECRET
              ValueFrom: !Sub "${SecretOAuth2}:OAUTH2_CLIENT_SECRET::"
            - Name: SPRING_DATA_MONGODB_URI
              ValueFrom: !Sub "${SecretMongoDB}:MONGO_URI_AUTH::"
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              Value: !Sub "http://eureka.${EurekaNamespaceName}:8761/eureka/"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/${EcrRepositoryPrefix}-auth-service"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: auth-service
          HealthCheck:
            Command: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health/readiness | grep -q UP || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

  AuthService:
    Type: AWS::ECS::Service
    DependsOn: EurekaService
    Properties:
      ServiceName: !Sub "${EcrRepositoryPrefix}-auth-service"
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      DesiredCount: !Ref NonCoreServiceDesiredCount
      TaskDefinition: !Ref AuthServiceTaskDefinition
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [IsLean, 'ENABLED', 'DISABLED']
          Subnets: !If [IsLean, !Ref PublicSubnetIds, !Ref PrivateSubnetIds]
          SecurityGroups:
            - !Ref InternalServiceSecurityGroup

  # 
  # TASK DEFINITION: book-appointment
  # 
  BookAppointmentTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EcrRepositoryPrefix}-book-appointment-task"
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: book-appointment
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryPrefix}-book-appointment:latest"
          PortMappings:
            - ContainerPort: 9091
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "${SecretJwt}:JWT_SECRET::"
            - Name: SPRING_DATA_MONGODB_URI
              ValueFrom: !Sub "${SecretMongoDB}:MONGO_URI_BOOK::"
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              Value: !Sub "http://eureka.${EurekaNamespaceName}:8761/eureka/"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/${EcrRepositoryPrefix}-book-appointment"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: book-appointment
          HealthCheck:
            Command: ["CMD-SHELL", "curl -sf http://localhost:9091/actuator/health/readiness | grep -q UP || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

  BookAppointmentService:
    Type: AWS::ECS::Service
    DependsOn: EurekaService
    Properties:
      ServiceName: !Sub "${EcrRepositoryPrefix}-book-appointment"
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      DesiredCount: !Ref NonCoreServiceDesiredCount
      TaskDefinition: !Ref BookAppointmentTaskDefinition
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [IsLean, 'ENABLED', 'DISABLED']
          Subnets: !If [IsLean, !Ref PublicSubnetIds, !Ref PrivateSubnetIds]
          SecurityGroups:
            - !Ref InternalServiceSecurityGroup

  # 
  # TASK DEFINITION: chat
  # 
  ChatTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EcrRepositoryPrefix}-chat-task"
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: chat
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryPrefix}-chat:latest"
          PortMappings:
            - ContainerPort: 9090
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "${SecretJwt}:JWT_SECRET::"
            - Name: SPRING_DATA_MONGODB_URI
              ValueFrom: !Sub "${SecretMongoDB}:MONGO_URI_CHAT::"
            - Name: WHATSAPP_TOKEN
              ValueFrom: !Sub "${SecretChat}:WHATSAPP_TOKEN::"
            - Name: WHATSAPP_PHONE_ID
              ValueFrom: !Sub "${SecretChat}:WHATSAPP_PHONE_ID::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "${SecretChat}:OPENAI_API_KEY::"
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              Value: !Sub "http://eureka.${EurekaNamespaceName}:8761/eureka/"
            - Name: SPRING_DATA_REDIS_HOST
              Value: !Ref RedisHost
            - Name: SPRING_DATA_REDIS_PORT
              Value: !Sub "${RedisPort}"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/${EcrRepositoryPrefix}-chat"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: chat
          HealthCheck:
            Command: ["CMD-SHELL", "curl -sf http://localhost:9090/actuator/health/readiness | grep -q UP || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

  ChatService:
    Type: AWS::ECS::Service
    DependsOn: EurekaService
    Properties:
      ServiceName: !Sub "${EcrRepositoryPrefix}-chat"
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      DesiredCount: !Ref NonCoreServiceDesiredCount
      TaskDefinition: !Ref ChatTaskDefinition
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [IsLean, 'ENABLED', 'DISABLED']
          Subnets: !If [IsLean, !Ref PublicSubnetIds, !Ref PrivateSubnetIds]
          SecurityGroups:
            - !Ref InternalServiceSecurityGroup

  # 
  # TASK DEFINITION: i18n-service
  # 
  I18nTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EcrRepositoryPrefix}-i18n-service-task"
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: i18n-service
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryPrefix}-i18n-service:latest"
          PortMappings:
            - ContainerPort: 9092
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "${SecretJwt}:JWT_SECRET::"
            - Name: SPRING_DATA_MONGODB_URI
              ValueFrom: !Sub "${SecretMongoDB}:MONGO_URI_I18N::"
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              Value: !Sub "http://eureka.${EurekaNamespaceName}:8761/eureka/"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/${EcrRepositoryPrefix}-i18n-service"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: i18n-service
          HealthCheck:
            Command: ["CMD-SHELL", "curl -sf http://localhost:9092/actuator/health/readiness | grep -q UP || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

  I18nService:
    Type: AWS::ECS::Service
    DependsOn: EurekaService
    Properties:
      ServiceName: !Sub "${EcrRepositoryPrefix}-i18n-service"
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      DesiredCount: !Ref NonCoreServiceDesiredCount
      TaskDefinition: !Ref I18nTaskDefinition
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [IsLean, 'ENABLED', 'DISABLED']
          Subnets: !If [IsLean, !Ref PublicSubnetIds, !Ref PrivateSubnetIds]
          SecurityGroups:
            - !Ref InternalServiceSecurityGroup

  # 
  # TASK DEFINITION: gateway  (starts last  depends on all others)
  # 
  GatewayTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EcrRepositoryPrefix}-gateway-task"
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: gateway
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryPrefix}-gateway:latest"
          PortMappings:
            - ContainerPort: 8080
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "${SecretJwt}:JWT_SECRET::"
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              Value: !Sub "http://eureka.${EurekaNamespaceName}:8761/eureka/"
            - Name: EUREKA_PUBLIC_HOSTNAME
              Value: !GetAtt GatewayLoadBalancer.DNSName
            - Name: EUREKA_HOME_PAGE_URL
              Value: !Sub
                - "http://${GatewayDns}/"
                - GatewayDns: !GetAtt GatewayLoadBalancer.DNSName
            - Name: EUREKA_STATUS_PAGE_URL
              Value: !Sub
                - "http://${GatewayDns}/actuator/info"
                - GatewayDns: !GetAtt GatewayLoadBalancer.DNSName
            - Name: EUREKA_HEALTH_CHECK_URL
              Value: !Sub
                - "http://${GatewayDns}/actuator/health"
                - GatewayDns: !GetAtt GatewayLoadBalancer.DNSName
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/${EcrRepositoryPrefix}-gateway"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: gateway
          HealthCheck:
            Command: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/readiness | grep -q UP || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 90

  GatewayService:
    Type: AWS::ECS::Service
    DependsOn:
      - EurekaService
      - AuthService
      - BookAppointmentService
      - ChatService
      - I18nService
    Properties:
      ServiceName: !Sub "${EcrRepositoryPrefix}-gateway"
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      DesiredCount: !Ref GatewayDesiredCount
      TaskDefinition: !Ref GatewayTaskDefinition
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [IsLean, 'ENABLED', 'DISABLED']
          Subnets: !If [IsLean, !Ref PublicSubnetIds, !Ref PrivateSubnetIds]
          SecurityGroups:
            - !Ref GatewayServiceSecurityGroup
      LoadBalancers:
        - ContainerName: gateway
          ContainerPort: 8080
          TargetGroupArn: !Ref GatewayTargetGroup

Outputs:
  ClusterArn:
    Description: ECS Cluster ARN
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${EcrRepositoryPrefix}-cluster-arn"

  GatewayLoadBalancerDns:
    Description: Public DNS of the ALB  this is your application entry point
    Value: !GetAtt GatewayLoadBalancer.DNSName
    Export:
      Name: !Sub "${EcrRepositoryPrefix}-alb-dns"

  GatewayHttpsUrl:
    Condition: IsProduction
    Description: Public HTTPS URL of the gateway entry point
    Value: !Sub "https://${GatewayLoadBalancer.DNSName}"

  EurekaServiceArn:
    Description: Eureka ECS Service ARN
    Value: !Ref EurekaService

  AuthServiceArn:
    Description: Auth ECS Service ARN
    Value: !Ref AuthService

  SecretJwtArn:
    Description: ARN of the JWT Secrets Manager secret  update this with your real value
    Value: !Ref SecretJwt

  SecretMongoDBArn:
    Description: ARN of the MongoDB Secrets Manager secret  update with your Atlas URIs
    Value: !Ref SecretMongoDB


