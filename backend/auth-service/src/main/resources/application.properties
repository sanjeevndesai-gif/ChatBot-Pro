# Server Configuration
server.port=8082

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}

eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true

# Spring Application
spring.application.name=auth-service

# Spring Cloud Config
spring.cloud.config.import-check.enabled=false

# MongoDB Configuration
# Set SPRING_DATA_MONGODB_URI env var in Docker/prod; fallback to local dev
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/auth-service}

# Custom ATS Properties
ats.mongodburi=localhost
ats.mongodbPort=27017
ats.environment=dev
ats.mongoDatabase=auth-service
ats.collection=authInfo

# JWT secret — set JWT_SECRET env var in production; local dev fallback only
jwt.secret=${JWT_SECRET:ARNAN_AUTH_SERVICE_ULTRA_SECURE_SECRET_2026!!}

# OAuth2 settings
oauth2.jwt.secret=${jwt.secret}
oauth2.client.id=${OAUTH2_CLIENT_ID:chatbot-client}
oauth2.client.secret=${OAUTH2_CLIENT_SECRET:changeme-in-production}
oauth2.token.expiration-seconds=3600
oauth2.default-scope=api.read api.write

# Actuator health probes (for Docker healthcheck + ECS)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Production logging
logging.level.root=INFO
logging.level.org.springframework.web=WARN
logging.level.com.arnan=INFO


