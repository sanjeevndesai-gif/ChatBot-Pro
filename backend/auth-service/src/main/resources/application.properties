# Chat Service URL
chat.service.url=http://localhost:8080/chat

# Server Configuration
server.port=8082

# Spring Application
spring.application.name=auth-service

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Spring Cloud Config
spring.cloud.config.import-check.enabled=false

# =========================================================
# MongoDB Configuration
# =========================================================

# Primary Spring Mongo URI
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb+srv://sanjeevndesai_db_user:Sanpug%402601@chatbot.wqqueab.mongodb.net/auth-service?retryWrites=true&w=majority}

# Custom ATS Properties
ats.mongodb-uri=${SPRING_DATA_MONGODB_URI:mongodb+srv://sanjeevndesai_db_user:Sanpug%402601@chatbot.wqqueab.mongodb.net/auth-service?retryWrites=true&w=majority}

# Optional for local Mongo only
ats.mongodb-port=27017

# Environment
ats.environment=dev

# Database + Collection
ats.mongo-database=auth-service
ats.collection=authInfo

# =========================================================
# JWT Configuration
# =========================================================

jwt.secret=${JWT_SECRET:ARNAN_AUTH_SERVICE_ULTRA_SECURE_SECRET_2026!!}

# OAuth2 settings
oauth2.jwt.secret=${jwt.secret}
oauth2.client.id=${OAUTH2_CLIENT_ID:chatbot-client}
oauth2.client.secret=${OAUTH2_CLIENT_SECRET:changeme-in-production}
oauth2.token.expiration-seconds=3600
oauth2.default-scope=api.read api.write

# =========================================================
# Actuator
# =========================================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# =========================================================
# Logging
# =========================================================

logging.level.root=INFO
logging.level.org.springframework.web=WARN
logging.level.com.arnan=INFO
logging.level.org.mongodb.driver=INFO