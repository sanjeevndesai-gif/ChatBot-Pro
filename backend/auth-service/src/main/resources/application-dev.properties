# ===============================================================
# auth-service — DEV profile overrides
# Activated by: SPRING_PROFILES_ACTIVE=dev
# ===============================================================

# MongoDB — dev cluster (set via environment variable or CI/CD secret)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://dev-mongo-host:27017/auth-service}

# Custom ATS Properties
ats.mongodburi=${ATS_MONGODB_URI:dev-mongo-host}
ats.mongodbPort=${ATS_MONGODB_PORT:27017}
ats.environment=dev
