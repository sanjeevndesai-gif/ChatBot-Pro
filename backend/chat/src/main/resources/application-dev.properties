# ===============================================================
# chat — DEV profile overrides
# Activated by: SPRING_PROFILES_ACTIVE=dev
# ===============================================================

# MongoDB — dev cluster
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://dev-mongo-host:27017/chatdb}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:chatdb}

# Redis — dev instance
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:dev-redis-host}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
