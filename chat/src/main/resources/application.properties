# ===============================
# Application
# ===============================
spring.application.name=chat
server.port=9090

# ===============================
# Logging
# ===============================
logging.level.org.springframework.web=DEBUG

# ===============================
# MongoDB — defaults to local; overridden by profile files (dev/prod)
# ===============================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/chatdb}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:chatdb}

# REQUIRED for transactions (replica set)
spring.data.mongodb.auto-index-creation=true

