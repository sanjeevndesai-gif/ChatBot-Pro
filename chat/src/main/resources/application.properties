# ===============================
# Application
# ===============================
spring.application.name=chat
server.port=9090

# ===============================
# Logging
# ===============================
logging.level.root=INFO
logging.level.org.springframework.web=WARN
logging.level.com.arnan=INFO

# ===============================
# MongoDB
# ===============================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/chatdb}
spring.data.mongodb.database=chatdb

# REQUIRED for transactions (replica set)
spring.data.mongodb.auto-index-creation=true

# ===============================
# WhatsApp Cloud API
# ===============================
chat.whatsapp.token=${WHATSAPP_TOKEN:}
chat.whatsapp.phone-id=${WHATSAPP_PHONE_ID:}
chat.whatsapp.graph-url=https://graph.facebook.com/v18.0
chat.session.timeout-seconds=900
# ===============================
# OpenAI (optional, future use)
# ===============================
openai.api-key=${OPENAI_API_KEY:}

# ===============================
# REDIS CONFIGURATION
# ===============================

spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=
spring.data.redis.timeout=6000

# Lettuce Pool Config
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=15
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=3000

chat.external.doctor-service-url=http://doctor-service
chat.external.slot-service-url=http://book-appointment

# ===============================
# EUREKA / SERVICE DISCOVERY
# ===============================

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# OAuth2 resource server
oauth2.jwt.secret=${JWT_SECRET:local-dev-only-change-me-in-production}

# ===============================
# ACTUATOR HEALTH PROBES
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
