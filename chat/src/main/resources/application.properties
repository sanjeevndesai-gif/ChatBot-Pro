openai.api-key=YOUR_OPENAI_API_KEY

# ===============================
# REDIS CONFIGURATION — defaults to local; overridden by profile files (dev/prod)
# ===============================

spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=6000

# Lettuce Pool Config
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=15
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=3000

chat.external.doctor-service-url=http://doctor-service
chat.external.slot-service-url=http://book-appointment

# ===============================
# EUREKA / SERVICE DISCOVERY
# ===============================

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# OAuth2 resource server
oauth2.jwt.secret=${JWT_SECRET:ARNAN_AUTH_SERVICE_ULTRA_SECURE_SECRET_2026!!}
