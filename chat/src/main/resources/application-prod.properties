# ===============================================================
# chat — PROD profile overrides
# Activated by: SPRING_PROFILES_ACTIVE=prod
# ===============================================================

# MongoDB — production cluster (MUST be supplied via environment variable or CI/CD secret)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://prod-mongo-host:27017/chatdb}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:chatdb}

# Redis — production instance
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:prod-redis-host}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
