# ===============================================================
# auth-service — PROD profile overrides
# Activated by: SPRING_PROFILES_ACTIVE=prod
# ===============================================================

# MongoDB — production cluster (MUST be supplied via environment variable or CI/CD secret)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://prod-mongo-host:27017/auth-service}

# Custom ATS Properties
ats.mongodburi=${ATS_MONGODB_URI:prod-mongo-host}
ats.mongodbPort=${ATS_MONGODB_PORT:27017}
ats.environment=prod
