# Server Configuration
server.port=8082

# Eureka Configuration
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true

# Spring Application
spring.application.name=auth-service

# Spring Cloud Config
spring.cloud.config.import-check.enabled=false

# MongoDB Configuration — defaults to local; overridden by profile files (dev/prod)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/auth-service}

# Custom ATS Properties
ats.mongodburi=${ATS_MONGODB_URI:localhost}
ats.mongodbPort=${ATS_MONGODB_PORT:27017}
ats.environment=${SPRING_PROFILES_ACTIVE:local}
ats.mongoDatabase=auth-service
ats.collection=authInfo

#JWT_SECRET=your-secret-ke
jwt.secret=ARNAN_AUTH_SERVICE_ULTRA_SECURE_SECRET_2026!!

# OAuth2 settings
oauth2.jwt.secret=${JWT_SECRET:${jwt.secret}}
oauth2.client.id=${OAUTH2_CLIENT_ID:chatbot-client}
oauth2.client.secret=${OAUTH2_CLIENT_SECRET:chatbot-secret}
oauth2.token.expiration-seconds=3600
oauth2.default-scope=api.read api.write

