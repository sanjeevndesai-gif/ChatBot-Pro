<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="64" viewBox="0 0 320 64" role="img" aria-labelledby="titleDesc">
  <title id="titleDesc">Tridlio wordmark</title>
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap');
      .t { font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; font-weight:700; font-size:48px; letter-spacing: -1px }
    </style>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0b63a6"/>
      <stop offset="100%" stop-color="#18a0e8"/>
    </linearGradient>
  </defs>

  <!-- Wordmark: Tridlio -->
  <text class="t" x="0" y="46" fill="url(#g)">Tridlio</text>

  <!-- Stylized T notch (subtle diagonal cut on the top-right of T stem) -->
  <g transform="translate(6,6)">
    <polygon points="44,6 58,6 48,18" fill="#ffffff" opacity="0.9" />
  </g>

  <!-- Optional subtle inner cut on 'd' and 'o' to make shapes feel custom -->
  <g fill="#ffffff" opacity="0.03">
    <ellipse cx="156" cy="36" rx="18" ry="20" />
  </g>
</svg>
