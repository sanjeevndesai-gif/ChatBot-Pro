<div class="settings-wrapper">

  <!-- Report Setting Card -->
  <div class="card">
    <div class="card-content">

      <div class="settings-section">
        <h3 class="section-title">Report Setting</h3>

        <div class="card-item">
          <div>
            <strong>On demand</strong>
            <span>Say Hi and get report</span>
          </div>
          <label class="switch">
            <input type="checkbox" [checked]="onDemand" (change)="toggle('onDemand')" [disabled]="!canEdit">
            <span class="slider"></span>
          </label>
        </div>

        <div class="card-item">
          <div>
            <strong>Scheduled Report</strong>
            <span>Every day will report</span>
          </div>
          <label class="switch">
            <input type="checkbox" [checked]="scheduledReport" (change)="toggle('scheduledReport')" [disabled]="!canEdit">
            <span class="slider"></span>
          </label>
        </div>

      </div>

    </div>
  </div>

  <!-- Message Setting Card -->
  <div class="card">
    <div class="card-content">

      <div class="settings-section">
        <h3 class="section-title">Message Setting</h3>

        <div class="card-item">
          <div>
            <strong>Feedback message</strong>
            <span>Not Connected</span>
          </div>
          <label class="switch">
            <input type="checkbox" [checked]="feedbackMessage" (change)="toggle('feedbackMessage')" [disabled]="!canEdit">
            <span class="slider"></span>
          </label>
        </div>

        <div class="card-item">
          <div>
            <strong>Reminder messages</strong>
            <span>Calendar & contacts</span>
          </div>
          <label class="switch">
            <input type="checkbox" [checked]="reminderMessages" (change)="toggle('reminderMessages')" [disabled]="!canEdit">
            <span class="slider"></span>
          </label>
        </div>

      </div>

    </div>
  </div>

</div>
        <!-- Action buttons -->
        <div class="settings-actions" style="margin-top:16px; display:flex; gap:8px;">
          <button class="btn btn-primary" (click)="onSave()" [disabled]="!canEdit">Save</button>
          <button class="btn btn-secondary" (click)="onCancel()">Cancel</button>
        </div>
