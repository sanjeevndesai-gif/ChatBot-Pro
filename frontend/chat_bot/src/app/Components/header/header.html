<nav class="navbar navbar-expand-lg shadow-sm sticky-top header" [class.hide]="hideHeader">

    <div class="container">
        <a class="navbar-brand d-flex align-items-center" routerLink="/">
            <img src="assets/images/tridlio-logo.png" height="44" class="me-2 brand-logo-highlight" alt="Tridlio logo" onerror="this.onerror=null;this.src='assets/images/ico.png'" />
            <div class="d-flex flex-column">
                <span class="fw-bold">TRIDLIO</span>
                <small class="text-muted header-sub">TECH SOLUTIONS</small>
            </div>
        </a>

        <button class="navbar-toggler" type="button" (click)="toggleCollapse()" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" [class.show]="!isCollapsed">
            <ul class="navbar-nav ms-auto align-items-lg-center">

                <!-- Actual QR Code in Header -->
                <li class="nav-item me-2" style="display: flex; align-items: center;">
                    <ng-container *ngIf="qrImgUrl && !qrLoading && !qrError">
                        <img [src]="qrImgUrl" width="36" height="36" alt="QR Code" style="border:1px solid #ccc; background: #fff; padding: 2px; cursor: pointer;" title="Scan to view profile" />
                    </ng-container>
                    <ng-container *ngIf="qrLoading">
                        <span class="spinner-border spinner-border-sm text-primary"></span>
                    </ng-container>
                    <ng-container *ngIf="qrError">
                        <i class="bi bi-qr-code" style="font-size: 1.4rem; color: #ccc;" title="QR code unavailable"></i>
                    </ng-container>
                </li>

                <li class="nav-item">
                    <a class="nav-link" routerLink="/" fragment="features">Features</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/" fragment="pricing">Pricing</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" routerLink="/" fragment="testimonials">Testimonials</a>
                </li>

                <li class="nav-item ms-3">
                    <a class="btn btn-outline-primary btn-sm" routerLink="/login">Login</a>
                </li>

                <li class="nav-item ms-2">
                    <a class="btn btn-primary btn-sm" routerLink="/register">Register</a>
                </li>

                @if (languages.length > 0) {
                <li class="nav-item ms-3 dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        <span class="me-1">{{ selectedLang?.flag }}</span>
                        {{ selectedLang?.label }}
                    </a>
                    <ul class="dropdown-menu">
                        @for (lang of languages; track lang.code) {
                        <li>
                            <button class="dropdown-item d-flex align-items-center">
                                <span class="me-2">{{ lang.flag }}</span>
                                {{ lang.label }}
                            </button>
                        </li>
                        }
                    </ul>
                </li>
                }

            </ul>
        </div>
    </div>
</nav>
