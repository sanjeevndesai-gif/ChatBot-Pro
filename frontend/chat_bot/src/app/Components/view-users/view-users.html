<!-- Content wrapper -->
<div class="content-wrapper">
    <div class="flex-grow-1">

        <div class="card">

            <div class="card-header d-flex filter-container">
                <h4>User List</h4>

                <div class="search-wrapper">
                    <input type="text" class="form-control" placeholder="Search..." [(ngModel)]="searchText"
                        (input)="applyFilter()" />
                </div>

                <div class="button-group">
                    <button class="btn cb-btn-primary" (click)="openAddUser()">
                        <i class="bi bi-person-plus me-1"></i> Add User
                    </button>

                    <button class="btn btn-outline-primary" (click)="exportCSV()">
                        <i class="bi bi-filetype-csv me-1"></i> Export CSV
                    </button>
                </div>
            </div>

            <!-- 🔵 LOADING -->
            <div *ngIf="loading" class="alert alert-info m-3">
                Loading users from server...
            </div>

            <!-- 🟡 ERROR -->
            <div *ngIf="errorMessage" class="alert alert-warning m-3">
                {{ errorMessage }} (Showing cached data)
            </div>



            <div class="table-responsive text-nowrap">
                <table class="table table-striped table-bordered table-hover">
                    <thead>
                        <tr>
                            <th width="120">Sl. No</th>

                            <th (click)="sort('name')" style="cursor:pointer;">
                                <div class="d-flex align-items-center gap-2">
                                    Name
                                    <i class="bi" [ngClass]="
         sortColumn === 'name'
           ? (sortDirection === 'asc' ? 'bi-arrow-up' : 'bi-arrow-down')
           : 'bi-arrow-down-up'
       ">
                                    </i>
                                </div>
                            </th>


                            <th (click)="sort('phone')" style="cursor:pointer;">
                                <div class="d-flex align-items-center gap-2">
                                    Phone
                                    <i class="bi" [ngClass]="
         sortColumn === 'phone'
           ? (sortDirection === 'asc' ? 'bi-arrow-up' : 'bi-arrow-down')
           : 'bi-arrow-down-up'
       ">
                                    </i>
                                </div>
                            </th>

                            <th (click)="sort('specialization')" style="cursor:pointer;">
                                <div class="d-flex align-items-center gap-2">
                                    Specialization
                                    <i class="bi" [ngClass]="
         sortColumn === 'specialization'
           ? (sortDirection === 'asc' ? 'bi-arrow-up' : 'bi-arrow-down')
           : 'bi-arrow-down-up'
       ">
                                    </i>
                                </div>
                            </th>

                            <th (click)="sort('role')" style="cursor:pointer;">
                                <div class="d-flex align-items-center gap-2">
                                    Role
                                    <i class="bi" [ngClass]="
         sortColumn === 'role'
           ? (sortDirection === 'asc' ? 'bi-arrow-up' : 'bi-arrow-down')
           : 'bi-arrow-down-up'
       ">
                                    </i>
                                </div>
                            </th>


                            <th width="120">Action</th>
                        </tr>
                    </thead>

                    <tbody class="table-border-bottom-0">

                        <!-- LOOP THROUGH DATA -->
                        <tr *ngFor="let user of pagedList; let i = index">
                            <td>{{ (currentPage - 1) * pageSize + i + 1 }}</td>
                            <td>{{ user.name }}</td>
                            <td>{{ user.phone }}</td>
                            <td>{{ user.specialization }}</td>
                            <td>{{ user.role }}</td>
                            <td class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-primary" (click)="editUser(user)">
                                    Edit
                                </button>
                                <button class="btn btn-sm btn-outline-danger" (click)="deleteUser(user)">
                                    Delete
                                </button>
                            </td>
                        </tr>

                        <tr *ngIf="pagedList.length === 0">
                            <td colspan="5" class="text-center text-muted">
                                No users found
                            </td>
                        </tr>

                    </tbody>

                </table>
            </div>
            <!-- PAGINATION -->
            <div class="d-flex justify-content-between align-items-center mt-3 mb-3 px-3">

                <!-- Page Size -->
                <div class="d-flex align-items-center gap-2">
                    <span>Show:</span>
                    <select class="form-select" style="width: 80px;" [(ngModel)]="pageSize"
                        (change)="pageSizeChanged()">
                        <option [ngValue]="5">5</option>
                        <option [ngValue]="10">10</option>
                        <option [ngValue]="20">20</option>
                        <option [ngValue]="50">50</option>
                    </select>

                </div>

                <!-- Page Navigation -->
                <nav>
                    <ul class="pagination mb-0">

                        <!-- Prev -->
                        <li class="page-item" [class.disabled]="currentPage === 1">
                            <button class="page-link" (click)="prevPage()">Previous</button>
                        </li>

                        <!-- Page Numbers -->
                        <li class="page-item" *ngFor="let p of pages" [class.active]="currentPage === p">
                            <button class="page-link" (click)="goToPage(p)">{{ p }}</button>
                        </li>


                        <!-- Next -->
                        <li class="page-item" [class.disabled]="currentPage === totalPages">
                            <button class="page-link" (click)="nextPage()">Next</button>
                        </li>

                    </ul>
                </nav>

            </div>

        </div>

    </div>

    <div class="content-backdrop fade"></div>
</div>
<!-- Content wrapper end -->
