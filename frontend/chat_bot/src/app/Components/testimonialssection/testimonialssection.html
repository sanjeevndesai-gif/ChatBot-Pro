<section class="testimonials py-5">
    <div class="container text-center">
        <h2 class="fw-bold mb-3">Loved by Businesses Worldwide</h2>
        <p class="text-muted mb-5">
            See what our customers have to say about their experience with ChatBot Pro.
        </p>

        <div class="row g-4 justify-content-center">
            <div class="col-md-6 col-lg-4" *ngFor="let t of testimonials">
                <div class="card h-100 testimonial-card shadow-sm" [ngClass]="{ 'highlighted': t.highlighted }">
                    <div class="card-body">

                        <!-- Stars -->
                        <div class="mb-3">
                            <ng-container *ngFor="let s of [].constructor(t.stars)">
                                <i class="bi bi-star-fill text-warning"></i>
                            </ng-container>
                        </div>

                        <!-- Quote -->
                        <p class="fst-italic text-muted">
                            “{{ t.quote }}”
                        </p>

                        <!-- Author -->
                        <h6 class="fw-bold mt-3 mb-0">{{ t.name }}</h6>
                        <small class="text-muted">{{ t.role }}</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
