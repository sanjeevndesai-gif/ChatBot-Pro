<div class="profile-wrapper">

  <!-- ================= PROFILE DETAILS ================= -->
  <div class="profile-card mb-4">

    <!-- Profile Image -->
    <div class="photo-section">
      <img src="https://i.pravatar.cc/150" />
      <div class="actions">
        <button class="btn primary" type="button">Upload new photo</button>
        <button class="btn light" type="button">Reset</button>
      </div>
    </div>

    <!-- PROFILE FORM -->
    <form (ngSubmit)="saveProfile()">
      <div class="form-grid">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="user.fullname" name="fullname" required />
        </div>

        <div class="form-group">
          <label>E-mail</label>
          <input type="email" [(ngModel)]="user.email" name="email" required />
        </div>

        <div class="form-group">
          <label>Organization</label>
          <input type="text" [value]="user.orgId" disabled />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" [(ngModel)]="user.phone" name="phone" />
        </div>

        <div class="form-group">
          <label>Address</label>
          <input type="text" [(ngModel)]="user.address" name="address" />
        </div>

        <div class="form-group">
          <label>Country</label>
          <select [(ngModel)]="user.country" name="country">
            <option value="">Select</option>
            <option>India</option>
            <option>USA</option>
          </select>
        </div>

        <div class="form-group">
          <label>Language</label>
          <select [(ngModel)]="user.language" name="language">
            <option>English</option>
            <option>Hindi</option>
          </select>
        </div>

      </div>

      <div class="actions">
        <button type="submit" class="btn primary">Save changes</button>
        <button type="button" class="btn light" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </div>

  <!-- ================= CHANGE PASSWORD ================= -->
  <div class="profile-card">

    <form>
      <h4>Change Password</h4>

      <div class="form-grid">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" [(ngModel)]="currentPassword" name="currentPassword" />
        </div>

        <div class="form-group">
          <label>New Password</label>
          <input type="password" [(ngModel)]="newPassword" name="newPassword" />
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" />
        </div>
      </div>

      <p>Password Requirements:</p>
      <ul>
        <li>Minimum 8 characters</li>
        <li>At least one lowercase letter</li>
        <li>At least one number or symbol</li>
      </ul>

      <div class="actions">
        <button type="button" class="btn primary" disabled>
          Save changes
        </button>
        <button type="button" class="btn light">Cancel</button>
      </div>
    </form>

  </div>

</div>
