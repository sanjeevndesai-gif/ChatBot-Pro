<section class="features py-5 my-5">
    <div class="container text-center">
        <h2 class="fw-bold mb-3">Everything You Need to Succeed</h2>
        <p class="text-muted mb-5">
            Our comprehensive platform provides all the tools and features you need to create,
            deploy, and manage successful WhatsApp chatbots.
        </p>

        <div class="row g-3">
            <div class="col-md-6 col-lg-4" *ngFor="let feature of features">
                <div class="card h-100 shadow-sm feature-card .fade-in-up">
                    <div class="card-body text-start">
                        <i class="bi {{ feature.icon }} fs-2 text-success mb-3"></i>
                        <h5 class="card-title fw-bold">{{ feature.title }}</h5>
                        <p class="card-text text-muted">{{ feature.description }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
